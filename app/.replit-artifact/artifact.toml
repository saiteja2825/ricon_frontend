kind = "web"
previewPath = "/"
title = "Ricon Technology"
version = "1.0.0"
id = "artifacts/ricon"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25769

[services.development]
run = "pnpm --filter @workspace/ricon run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ricon", "run", "build" ]
publicDir = "artifacts/ricon/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25769"
BASE_PATH = "/"
